name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust audit tools
        run: cargo install cargo-audit cargo-deny cargo-machete --locked

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Security advisories
        run: cargo audit

      - name: License and dependency policy
        run: cargo deny check

      - name: Unused dependencies
        run: cargo machete

  npm:
    name: npm wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install without postinstall
        run: npm ci --ignore-scripts

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Build native binary
        run: npm run build:native

      - name: Prepare prebuilt binary
        run: npm run prepare:prebuilt

      - name: Test npm package layout
        run: npm pack --dry-run

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
